name: Deploy Backend to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API
        run: dotnet publish Backend/API/EventosVivos.API/EventosVivos.API.csproj -c Release -o ./publish

      - name: Prepare deploy files
        run: |
          cp Backend/fly.toml ./publish/
          cat > ./publish/Dockerfile <<'EOF'
          FROM mcr.microsoft.com/dotnet/aspnet:10.0
          WORKDIR /app
          COPY . .
          EXPOSE 8080
          ENTRYPOINT ["dotnet", "EventosVivos.API.dll"]
          EOF

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy ./publish --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
