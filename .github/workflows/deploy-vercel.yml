name: Deploy Angular to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'Cliente/**'
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./Cliente

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: Cliente/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Prepare Vercel prebuilt output
        run: |
          mkdir -p .vercel
          echo '{"orgId":"'"$VERCEL_ORG_ID"'","projectId":"'"$VERCEL_PROJECT_ID"'"}' > .vercel/project.json
          mkdir -p .vercel/output/static
          cp -r dist/Cliente/browser/* .vercel/output/static/
          echo '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)", "dest":"/index.html"}]}' > .vercel/output/config.json
          echo "=== Files in static ==="
          ls -la .vercel/output/static/

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
