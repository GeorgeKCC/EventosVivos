<section class="reportes">
  <h2>Reportes</h2>

  @if (error()) {
    <p class="error-msg">{{ error() }}</p>
  }

  <form class="form" (ngSubmit)="download()">
    <div class="form-row">
      <div class="field">
        <label for="eventoId">Evento ID</label>
        <input id="eventoId" type="number" [(ngModel)]="form.eventoId" name="eventoId" required />
      </div>
      <div class="field">
        <label for="tipoReporte">Tipo de Reporte</label>
        <select id="tipoReporte" [(ngModel)]="form.tipoReporte" name="tipoReporte" required>
          @for (tipo of tiposReporte; track tipo.value) {
            <option [value]="tipo.value">{{ tipo.label }}</option>
          }
        </select>
      </div>
    </div>

    <div class="form-row actions">
      <button type="submit" [disabled]="loading()" class="btn-primary">
        {{ loading() ? 'Descargando...' : 'Descargar Reporte' }}
      </button>
    </div>
  </form>
</section>
