<section class="crear-evento">
  <h2>Crear Evento</h2>

  @if (error()) {
    <p class="error-msg">{{ error() }}</p>
  }

  <form class="form" (ngSubmit)="submit()">
    <div class="form-row">
      <div class="field">
        <label for="titulo">Título</label>
        <input id="titulo" type="text" [(ngModel)]="form.titulo" name="titulo" required />
      </div>
      <div class="field">
        <label for="descripcion">Descripción</label>
        <input id="descripcion" type="text" [(ngModel)]="form.descripcion" name="descripcion" required />
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label for="capacidadMaxima">Capacidad Máxima</label>
        <input id="capacidadMaxima" type="number" [(ngModel)]="form.capacidadMaxima" name="capacidadMaxima" required />
      </div>
      <div class="field">
        <label for="precio">Precio</label>
        <input id="precio" type="number" step="0.01" [(ngModel)]="form.precio" name="precio" required />
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label for="inicioEvento">Fecha Inicio</label>
        <input id="inicioEvento" type="date" [(ngModel)]="form.inicioEvento" name="inicioEvento" required />
      </div>
      <div class="field">
        <label for="iniciaHora">Hora Inicio</label>
        <input id="iniciaHora" type="time" [(ngModel)]="form.iniciaHora" name="iniciaHora" required />
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label for="finEvento">Fecha Fin</label>
        <input id="finEvento" type="date" [(ngModel)]="form.finEvento" name="finEvento" required />
      </div>
      <div class="field">
        <label for="finHora">Hora Fin</label>
        <input id="finHora" type="time" [(ngModel)]="form.finHora" name="finHora" required />
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label for="venueId">Venue</label>
        <select id="venueId" [(ngModel)]="form.venueId" name="venueId" required>
          <option [value]="0" disabled>Seleccione un venue</option>
          @for (venue of venues(); track venue.id) {
            <option [value]="venue.id">{{ venue.nombre }} - {{ venue.ciudad }}</option>
          }
        </select>
      </div>
      <div class="field">
        <label for="tipoEventoId">Tipo Evento</label>
        <select id="tipoEventoId" [(ngModel)]="form.tipoEventoId" name="tipoEventoId" required>
          <option [value]="0" disabled>Seleccione un tipo</option>
          @for (tipo of tiposEvento(); track tipo.id) {
            <option [value]="tipo.id">{{ tipo.nombre }}</option>
          }
        </select>
      </div>
    </div>

    <div class="form-row actions">
      <button type="button" (click)="router.navigate(['/buscar-evento'])">Cancelar</button>
      <button type="submit" [disabled]="loading()" class="btn-primary">
        {{ loading() ? 'Creando...' : 'Crear Evento' }}
      </button>
    </div>
  </form>
</section>
