<section class="login">
  <h2>Iniciar Sesión</h2>

  @if (error()) {
    <p class="error-msg">{{ error() }}</p>
  }

  <form class="form" (ngSubmit)="submit()">
    <div class="field">
      <label for="username">Usuario</label>
      <input id="username" type="text" [(ngModel)]="form.username" name="username" required autocomplete="username" />
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input id="password" type="password" [(ngModel)]="form.password" name="password" required autocomplete="current-password" />
    </div>
    <div class="actions">
      <button type="submit" [disabled]="loading()" class="btn-primary">
        {{ loading() ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </div>
  </form>
</section>
